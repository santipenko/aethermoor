name: Build, Commit, and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies (if needed)
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Run build
        run: node build.js

      - name: Copy build to docs
        run: |
          rm -rf docs
          mkdir docs
          cp -r dist/* docs/

      - name: Commit and push docs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add docs

          git diff --cached --quiet || git commit -m "Auto-build docs"

          git push
