<!-- ── Title Screen HTML ───────────────────────────────────── -->

    <div id="title-main" style="font-family:'Courier New',monospace;font-size:clamp(32px,9vw,88px);font-weight:900;letter-spacing:0.04em;line-height:1;color:#fff;text-shadow:0 0 60px rgba(0,229,255,0.5), 0 0 120px rgba(0,229,255,0.2);margin-bottom:6px;position:relative;">

    <div style="font-family:'Courier New',monospace;font-size:clamp(9px,2vw,12px);letter-spacing:0.28em;color:var(--text-dim);text-transform:uppercase;margin-bottom:40px;">Tactical Chronicles</div>
    <div style="font-family:'Courier New',monospace;font-size:clamp(10px,2.2vw,13px);letter-spacing:0.12em;color:var(--text);line-height:1.6;max-width:340px;margin:0 auto 40px;opacity:0.7;font-style:italic;">"The ruin remembers those<br>who fought within its bones."</div>

    <div id="title-save-info" style="display:none;margin-top:12px;font-family:'Courier New',monospace;font-size:clamp(8px,1.8vw,10px);color:var(--text-dim);letter-spacing:0.1em;"></div>
  </div>
  <div style="position:absolute;bottom:16px;left:0;right:0;text-align:center;font-family:'Courier New',monospace;font-size:clamp(7px,1.5vw,9px);letter-spacing:0.2em;color:rgba(74,96,112,0.5);text-transform:uppercase;">&#9672; Browser Demo &#8212; Vanilla JS Engine &#9672;</div>
</div>

<!-- ── Cutscene Overlay HTML ────────────────────────────────── -->
<div id="cutscene-overlay" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(2,6,14,0.97);flex-direction:column;align-items:center;justify-content:flex-end;padding:0 0 clamp(20px,5vh,50px);cursor:pointer;user-select:none;">
  <div id="cs-bg-tint" style="position:absolute;inset:0;pointer-events:none;transition:background 0.6s;"></div>

  </div>
  <div id="cs-dialogue-box" style="position:relative;z-index:2;width:min(700px,92vw);background:linear-gradient(135deg, rgba(4,10,22,0.98) 0%, rgba(6,16,30,0.96) 100%);border:1px solid rgba(0,229,255,0.25);box-shadow:0 0 40px rgba(0,229,255,0.08), inset 0 0 20px rgba(0,0,0,0.5);padding:0;clip-path:polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));">

        <span id="cs-portrait-char" style="position:relative;z-index:1;filter:drop-shadow(0 0 8px currentColor);"></span>
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,229,255,0.04) 3px,rgba(0,229,255,0.04) 4px);pointer-events:none;"></div>
      </div>
      <div style="flex:1;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(0,229,255,0.12);">
        <div id="cs-speaker-name" style="font-family:'Courier New',monospace;font-size:clamp(11px,2.8vw,16px);font-weight:bold;letter-spacing:0.18em;color:var(--gold);text-transform:uppercase;"></div>
        <div id="cs-scene-counter" style="font-family:'Courier New',monospace;font-size:clamp(8px,1.8vw,10px);color:var(--text-dim);letter-spacing:0.12em;"></div>
      </div>
    </div>
    <div style="padding:clamp(12px,3vw,20px) clamp(14px,3vw,22px);">
      <div id="cs-text" style="font-family:'Courier New',monospace;font-size:clamp(11px,2.5vw,14px);line-height:1.75;color:var(--text);min-height:clamp(52px,8vh,80px);letter-spacing:0.04em;"></div>
      <div style="display:flex;align-items:center;justify-content:flex-end;margin-top:10px;gap:8px;">
        <div id="cs-advance-hint" style="font-family:'Courier New',monospace;font-size:clamp(8px,1.8vw,10px);color:var(--text-dim);letter-spacing:0.12em;animation:cs-blink 1.1s step-end infinite;display:none;">TAP TO CONTINUE &#9656;</div>
      </div>
    </div>
  </div>
</div>

<!-- ── Save notification ─────────────────────────────────────── -->
<div id="save-toast" style="display:none;position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:500;font-family:'Courier New',monospace;font-size:clamp(9px,2vw,11px);letter-spacing:0.2em;color:var(--accent);background:rgba(4,10,22,0.95);border:1px solid rgba(0,229,255,0.3);padding:6px 16px;text-transform:uppercase;pointer-events:none;animation:cs-blink 1s ease-in-out 3;">&#9672; SAVED &#9672;</div>

<style>
@keyframes cs-blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

}

}
.glitch-layer { animation: title-glitch 6s infinite; }
.glitch-layer2 { animation: title-glitch2 6s infinite; }
#btn-begin:hover { background:#33eeff !important; transform:scale(1.04); }
